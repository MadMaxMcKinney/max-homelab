version: "3.3"
services:
    komga:
        image: gotson/komga
        container_name: komga
        volumes:
            - type: bind
              source: ./config
              target: /config
            - type: bind
              source: /path/to/data
              target: /data
        ports:
            - 25600:25600
        environment:
            - TZ=America/Chicago
            - JAVA_TOOL_OPTIONS=-Xmx4g
        restart: unless-stopped
