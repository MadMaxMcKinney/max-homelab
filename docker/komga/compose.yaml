version: "3.3"
services:
    komga:
        image: gotson/komga
        container_name: komga
        volumes:
            - type: bind
              source: ${KOMGA_CONFIG_PATH}
              target: /config
            - type: bind
              source: ${KOMGA_LIBRARY_PATH}
              target: /data
        ports:
            - 25600:25600
        environment:
            - TZ=America/Chicago
            - JAVA_TOOL_OPTIONS=-Xmx4g
        restart: unless-stopped
