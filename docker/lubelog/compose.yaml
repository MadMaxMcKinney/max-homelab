services:
    lubelogger:
        image: ghcr.io/hargata/lubelogger:latest
        restart: unless-stopped
        volumes:
            - ${DATA_PATH}:/App/data
            - ${KEYS_PATH}:/root/.aspnet/DataProtection-Keys
        # expose port and/or use serving via traefik
        ports:
            - 8080:8080
        networks:
            - newt_network

networks:
    newt_network:
        external: true
